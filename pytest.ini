[pytest]
asyncio_mode = auto
timeout = 30
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts = -v --tb=short

markers =
    p0: Core risk - first batch
    p1: Basic functionality - second batch
    p2: Robustness - third batch
    p3: Completeness - fourth batch
    smoke: Smoke tests - run after every deployment
    spec128: 128-group expansion related
    peripheral: Peripheral parameter related
    torque_arm: Torque arm related
    barcode: Barcode related
    network: Network configuration related
    machine_type: Machine type management related
    system: System-level functionality
    pfop: PFOP protocol related
    work_mode: Work mode switching related
    stress: Stress tests (long running)
    persistence: Requires backend restart (needs SSH)
    destructive: May affect system state (use with caution)
    hardware: Requires real hardware (MCU/torque arm/scanner)
